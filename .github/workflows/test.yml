name: Test Python

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: コード取得
      uses: actions/checkout@v3

    - name: Pythonセットアップ
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: 実行
      run: python test.py